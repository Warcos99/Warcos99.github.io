<!doctype html>
<html>
  <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Life Tracker</title>
        <!-- insert title -->
        <link rel="stylesheet" href="/Assets/Styles/global.css" />
        <link rel="stylesheet" href="/Assets/Styles/style.css" />
        <link rel="stylesheet" href="/Assets/Styles/NavbarStyle.css" />
        
        <!-- style for the columns and buttons on this specific page -->
        <style>
          /* ---- for flex columns ----*/
          .tracker-columns {
            display: flex;
            gap: 80px;
            justify-content: center;
            flex-wrap: wrap;
          }

          button {
            padding: 12px 20px;
            font-size: 1rem;
            margin: 4px;
          }

          /* ---- Background Image ----*/
          body {
            background-image: url("/Assets/Images/backgrounds/rock.webp");
            background-repeat: repeat;
            background-size: 200px 200px; /* optional: controls the size of each tile */
          }

          /* ---- keeps the navbar above every other element ----*/
          #header {
            position: relative;
            z-index: 1000;
          }

          /* ----- counter block is triangle/circle + reset button block ----*/
          .counter-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
          }
          /* ---- Counter row is the Triangle/Circle/Triangle Commbo ----*/
          .counter-row {
            display: flex;
            align-items: center;
            gap: 18px;
          }

          /* ---- Makes the circle ----*/
          .counter-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
            user-select: none;
          }
          
          /* ---- colors for circles ----*/
          .counter-circle-red { background-color: #d64545; }
          .counter-circle-blue { background-color: #3f7fd6; }
          .counter-circle-green { background-color: #4a9d5c; }
          .counter-circle-orange { background-color: #e08a34; }
          .counter-circle-gold { background-color: #faa307; }
          .counter-circle-life { background-color: #f08080; }
            
          /* ---- Makes triangles ----*/
          .triangle-btn {
            width: 0;
            height: 0;
            padding: 0;
            margin: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.15s ease, transform 0.15s ease;
          }
          /* ---- darkens button and increases it's size by 10% when hovering ----*/
          .triangle-btn:hover {
            opacity: 1;
            transform: scale(1.1);
          }

          .triangle-left {
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-right: 22px solid #1a1a1a;
          }

          .triangle-right {
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 22px solid #1a1a1a;
          }
        </style>

  </head>
  <body>

    <div class="layout">
      <div id="header"></div>
    </div>
    
    <div class="content">
      <h1>Magic the Gathering Life Tracker</h1>
      <p>For Commander format</p>
      <hr>
      <div class="tracker-columns">

<!-- Life Tracker -->
        <div>
          <div class="counter-block">
            <h2>Life</h2>
            <div class="counter-row">
              <button class="triangle-btn triangle-left" id="fiveDamage" aria-label="Decrease life by 5"></button>
              <button class="triangle-btn triangle-left" id="oneDamage" aria-label="Decrease life by 1"></button>
              <div class="counter-circle counter-circle-life" id="life">40</div>
              <button class="triangle-btn triangle-right" id="oneLife" aria-label="Increase life by 1"></button>
              <button class="triangle-btn triangle-right" id="fiveLife" aria-label="Increase life by 5"></button>
            </div>
            <button id="reset">Reset</button>
            <button id="customLife">Set Life</button>
          </div>
        </div>

<!-- Commander Tax -->
        <div>
          <div class="counter-block">
            <h2> Commander Tax</h2>
            <div class="counter-row">
              <button class="triangle-btn triangle-left" id="undo" aria-label="Decrease gold counter"></button>
              <div class="counter-circle counter-circle-gold" id="tax">0</div>
              <button class="triangle-btn triangle-right" id="oneDeath" aria-label="Increase gold counter"></button>
            </div>
            <button id="resetTax">Reset</button>
          </div>
        </div>
      </div>

      <hr>

      <h2>Other Counters</h2>
      <div class="tracker-columns">

<!-- Red Counter -->
        <div class="counter-block">
          <h3>Red</h3>
          <div class="counter-row">
            <button class="triangle-btn triangle-left" id="redMinus1" aria-label="Decrease red counter"></button>
            <div class="counter-circle counter-circle-red" id="RedCom">0</div>
            <button class="triangle-btn triangle-right" id="redPlus1" aria-label="Increase red counter"></button>
          </div>
          <button id="redReset">Reset</button>
        </div>

<!-- Blue Counter -->
        <div class="counter-block">
          <h3>Blue</h3>
          <div class="counter-row">
            <button class="triangle-btn triangle-left" id="blueMinus1" aria-label="Decrease blue counter"></button>
            <div class="counter-circle counter-circle-blue" id="BlueCom">0</div>
            <button class="triangle-btn triangle-right" id="bluePlus1" aria-label="Increase blue counter"></button>
          </div>
          <button id="blueReset">Reset</button>
        </div>

<!-- Green Counter -->
        <div class="counter-block">
          <h3>Green</h3>
          <div class="counter-row">
            <button class="triangle-btn triangle-left" id="greenMinus1" aria-label="Decrease green counter"></button>
            <div class="counter-circle counter-circle-green" id="GreenCom">0</div>
            <button class="triangle-btn triangle-right" id="greenPlus1" aria-label="Increase green counter"></button>
          </div>
          <button id="greenReset">Reset</button>
        </div>

<!-- Orange Counter -->
        <div class="counter-block">
          <h3>Orange</h3>
          <div class="counter-row">
            <button class="triangle-btn triangle-left" id="orangeMinus1" aria-label="Decrease orange counter"></button>
            <div class="counter-circle counter-circle-orange" id="OrangeCom">0</div>
            <button class="triangle-btn triangle-right" id="orangePlus1" aria-label="Increase orange counter"></button>
          </div>
          <button id="orangeReset">Reset</button>
        </div>
      </div>

<hr>
<hr>
<hr>

<!-- script for the main life buttons -->
  <script>
  // ----- Reusable counter setup -----
  function setupCounter(displayId, initialValue, buttonConfigs) {
    let value = initialValue;
    const display = document.getElementById(displayId);
    display.textContent = value; // sync display with starting value
    buttonConfigs.forEach(({ id, amount }) => {
      document.getElementById(id).addEventListener("click", () => {
        if (amount === "reset") {
          value = initialValue;
        } else if (amount === "custom") {
          const input = prompt("Set custom life");
          if (!input) return;
          value = Number(input);
          } else {
            value += amount;
          }
          display.textContent = value;
      });
    });
  }

    // ----- Life Tracker -----
    setupCounter("life", 40, [
        { id: "oneDamage", amount: -1 },
        { id: "fiveDamage", amount: -5 },
        { id: "oneLife", amount: 1 },
        { id: "fiveLife", amount: 5 },
        { id: "customLife", amount: "custom" },
        { id: "reset", amount: "reset" }
    ]);

    // ----- Commander Tax -----
    setupCounter("tax", 0, [
        { id: "undo", amount: -2 },
        { id: "oneDeath", amount: 2 },
        { id: "resetTax", amount: "reset" }
    ]);

    // ----- Commander Damage -----
    setupCounter("RedCom", 0, [
        { id: "redMinus1", amount: -1 },
        { id: "redPlus1", amount: 1 },
        { id: "redReset", amount: "reset" }
    ]);

    setupCounter("BlueCom", 0, [
        { id: "blueMinus1", amount: -1 },
        { id: "bluePlus1", amount: 1 },
        { id: "blueReset", amount: "reset" }

    ]);

    setupCounter("GreenCom", 0, [
        { id: "greenMinus1", amount: -1 },
        { id: "greenPlus1", amount: 1 },
        { id: "greenReset", amount: "reset" }

    ]);

    setupCounter("OrangeCom", 0, [
        { id: "orangeMinus1", amount: -1 },
        { id: "orangePlus1", amount: 1 },
        { id: "orangeReset", amount: "reset" }

    ]);
  </script>

<!-- Scripts from template -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/Assets/Scripts/loadcontent.js"></script>
    <script src="/Assets/Scripts/lightbox.js"></script>
  </body>
</html>
